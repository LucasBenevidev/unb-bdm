name: Benchmark de Consultas Paralelas SIORG

on:
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  run-parallel-benchmark:
    name: Run ClickHouse Parallel Benchmark
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install clickhouse-connect python-dotenv

      - name: Run Parallel Query Benchmark Script
        env:
          # ClickHouse Cloud Secrets
          CLICKHOUSE_HOST: ${{ secrets.CLICKHOUSE_HOST }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          CLICKHOUSE_DATABASE: ${{ secrets.CLICKHOUSE_DATABASE }}
          CLICKHOUSE_PORT: 8443
          CLICKHOUSE_USERNAME: "default"
        run: |
          python parallel_benchmark.py

      - name: Upload Parallel Ingestion Log File
        if: always() # Upload logs even if the benchmark fails
        uses: actions/upload-artifact@v4
        with:
          name: siorg-parallel-benchmark-logs
          path: siorg_parallel_benchmark.log
          retention-days: 7
